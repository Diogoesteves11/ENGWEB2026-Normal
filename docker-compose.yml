services:
  mongodb:
    build:
      context: ./ex1/dataset
      dockerfile: Dockerfile
    container_name: mongodb
    environment:
      - MONGO_INITDB_DATABASE=engweb
    ports:
      - "27017:27017"
    volumes:
      - mongodb:/data/db
    networks:
      - engweb

  data-api:
    build:
      context: ./ex1
      dockerfile: Dockerfile
    container_name: data-api
    environment:
      - MONGO_URL=mongodb://mongodb:27017/engweb
      - DB_NAME=engweb
      - PORT=25000
    ports:
      - "25000:25000"
    depends_on:
      - mongodb
    networks:
      - engweb

  interface:
    build:
      context: ./ex2
      dockerfile: Dockerfile
    container_name: interface
    ports:
      - "25001:25001"
    environment:
      - API_URL=http://data-api:25000
      - PORT=25001
    depends_on:
      - data-api
    networks:
      - engweb

networks:
  engweb:
    driver: bridge

volumes:
  mongodb:
